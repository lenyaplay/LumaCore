name: LumaCoreBindingsGenerated
description: >
  ffigen bindings for native/src/api/lumacore_api.h. Only the high-frequency
  dart:ffi surface is generated (ARCHITECTURE.md §3) — session lifecycle,
  per-frame rendering, and recording control are Obj-C++/Swift-only and never
  called from Dart, see ai_plans/03-ios-metal-render-pipeline.md §9.
output: 'lib/core/ffi/lumacore_bindings_generated.dart'
headers:
  entry-points:
    - 'native/src/api/lumacore_api.h'
functions:
  include:
    - 'lumacore_set_effect_params'
    - 'lumacore_get_stats'
structs:
  include:
    - 'LumaEffectParams'
    - 'LumaStats'
preamble: |
  // Generated by ffigen — do not edit by hand.
  // Regenerate with: dart run ffigen --config ffigen.yaml
