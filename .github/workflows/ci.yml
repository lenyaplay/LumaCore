name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # --- Working today (Task.md §6, Этап 0) ---------------------------------

  flutter-analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.10"
          channel: "stable"
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  native-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cmake -S native -B native/build
      - run: cmake --build native/build
      - run: ctest --test-dir native/build --output-on-failure

  server-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r server/requirements.txt
      - run: python -m pytest tests
        working-directory: server

  # --- Placeholders — real builds land as native/ platform work lands ------
